{% extends "base.html" %} {% block nav_class %}bottom-nav--content{% endblock %} {% block content %}
<div class="container">
  <article>
    <h1 style="font-size: 2.8rem; letter-spacing: -1px; margin-bottom: 10px">{{ page.title }}</h1>
    <p style="opacity: 0.6; margin-bottom: 40px">{{ page.date | date(format="%Y-%m-%d") }}</p>
    <div class="post-content">{{ page.content | safe }}</div>
  </article>
</div>
{% endblock content %}
